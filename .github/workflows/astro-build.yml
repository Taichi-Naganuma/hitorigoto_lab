# Node CI — astro build を PR ゲートにする（自走OS サイト改善「分業」の第二段ゲート）。
# 正本: my-portfolio Trains/docs/design/planned/os-site-improvement-division-of-labor.md §4-4。
# 目的: Cloudflare Workers Builds は main push で即デプロイするため、その手前（PR 段）で
#       `npm run build`（= astro build）の緑を server-side の真実にする。緑が出るまでオーナーは
#       マージしない運用（private+無料は branch protection 不可のため運用規約で担保・auto-merge しない）。
# 対象: main への全 PR（機械レーンの feat/lp-auto-* を含む）。手動実行も可。
name: astro build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: astro-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # QF-6: origin/main を取得し品質フロアの scope=changed 差分を確実にする
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies (locked)
        run: npm ci
      - name: Build (astro build)
        run: npm run build
      # 第三段ゲート＝品質フロア（トップ/os 同等以上）。正本設計: my-portfolio
      # Trains/docs/design/planned/quality-floor-standard-design.md §5-a／§6。
      # 点火済（QF-6・2026-07-12）: block 重症度（A2/A3/A4 token 整合・C1/C4 content 完全性）の fail で CI を赤にする。
      # warn（B2/B4/C2 等）は非ブロッキングのまま（os は別意匠ゆえ B2 未昇格）。現行 main は block 0 を実測済。
      # 解除に戻すには QUALITY_FLOOR_ENFORCE を外し continue-on-error: true を戻す。
      - name: Quality floor (enforced)
        run: |
          git fetch --no-tags --depth=1 origin main || true
          npm run quality-floor
        env:
          QUALITY_FLOOR_BASE: origin/main
          QUALITY_FLOOR_ENFORCE: "1"
